# Déploiement LOCAL (ce box) — pas d'infra DSC/Traefik.
# 2 services partageant une même base SQLite (volume) :
#   - scheduler : le moteur live (évalue, persiste, alerte)
#   - api       : couche de lecture (GET /history, /alerts, /snapshot)

services:
  scheduler:
    build: .
    command: ["python", "-m", "app.scheduler"]
    env_file: [.env]
    environment:
      GOLD_MACRO_DB: /data/gold_macro.db
      TRADE_DB_PATH: /data/trade.db        # prix XAU via le flux du système trade
    volumes:
      - gold_data:/data
      # montage LECTURE SEULE de la base du système trade (prix XAU) — optionnel.
      - /home/ubuntu/trade/trading.db:/data/trade.db:ro
    restart: unless-stopped

  api:
    build: .
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: [.env]
    environment:
      GOLD_MACRO_DB: /data/gold_macro.db
      GOLD_MACRO_WARMUP: "0"               # l'API lit la DB ; le scheduler écrit
    ports:
      - "8090:8000"   # 8000 occupé sur ce box -> dashboard sur :8090
    volumes:
      - gold_data:/data
    depends_on: [scheduler]
    restart: unless-stopped

volumes:
  gold_data:
